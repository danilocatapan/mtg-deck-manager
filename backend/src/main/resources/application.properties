quarkus.http.port=8080

quarkus.smallrye-openapi.path=/swagger
quarkus.smallrye-openapi.info-title=MTG Deck Manager API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

quarkus.log.level=INFO
quarkus.log.category."com.mtg".level=DEBUG

quarkus.cache.caffeine."cards-by-name".expire-after-write=10M
quarkus.cache.caffeine."cards-by-name".maximum-size=100

scryfall.api.url=https://api.scryfall.com
quarkus.rest-client.scryfall-api.url=${scryfall.api.url}
quarkus.rest-client.scryfall-api.scope=jakarta.inject.Singleton
quarkus.rest-client.scryfall-api.connect-timeout=5000
quarkus.rest-client.scryfall-api.read-timeout=5000

# H2 in-memory datasource for development/tests
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:mtg;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
