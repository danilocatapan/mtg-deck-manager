quarkus.application.name=mtg-deck-manager-api
quarkus.application.version=${APP_VERSION:0.0.0-local}
app.frontend.url=${FRONTEND_URL:https://danilocatapan.github.io/mtg-deck-manager/}
app.name=MTG Deck Manager API
app.version=${APP_VERSION:0.0.0-local}
app.commit=${APP_COMMIT:local}
app.branch=${APP_BRANCH:local}
app.build-time=${APP_BUILD_TIME:local}
app.environment=${APP_ENVIRONMENT:local}
app.creator=${APP_CREATOR:Danilo Catapan}
app.objective=${APP_OBJECTIVE:Analise e otimizacao de decks Commander com recomendacoes explicaveis.}

quarkus.http.port=${PORT:8080}

quarkus.smallrye-openapi.path=/swagger
quarkus.smallrye-openapi.info-title=MTG Deck Manager API
quarkus.smallrye-openapi.info-version=${APP_VERSION:0.0.0-local}
quarkus.swagger-ui.always-include=${SWAGGER_UI_ENABLED:false}
quarkus.swagger-ui.path=/swagger-ui

# Google ID tokens from the frontend are accepted as Bearer tokens for authenticated operations.
# Google OAuth/OIDC consent must be limited to openid, email and profile.
# The API does not persist Google access_token or refresh_token values.
quarkus.oidc.auth-server-url=https://accounts.google.com
quarkus.oidc.client-id=${GOOGLE_CLIENT_ID:}
quarkus.oidc.application-type=service
security.admin.subjects=${SECURITY_ADMIN_SUBJECTS:}
meta.top-decks.admin-emails=${META_ADMIN_EMAILS:dcatapan@gmail.com}

quarkus.log.level=INFO
quarkus.log.category."com.mtg".level=${APP_LOG_LEVEL:WARN}
quarkus.log.category."com.mtg.controller.SecurityResource".level=${SECURITY_STATUS_LOG_LEVEL:INFO}
quarkus.log.category."com.mtg.service.SecurityStatusService".level=${SECURITY_STATUS_LOG_LEVEL:INFO}
quarkus.http.limits.max-body-size=256K

quarkus.cache.caffeine."cards-by-name".expire-after-write=10M
quarkus.cache.caffeine."cards-by-name".maximum-size=100

scryfall.api.url=https://api.scryfall.com
quarkus.rest-client.scryfall-api.url=${scryfall.api.url}
quarkus.rest-client.scryfall-api.scope=jakarta.inject.Singleton
quarkus.rest-client.scryfall-api.connect-timeout=5000
quarkus.rest-client.scryfall-api.read-timeout=5000

quarkus.rest-client.spicerack-api.url=${SPICERACK_API_URL:https://api.spicerack.gg}
quarkus.rest-client.spicerack-api.scope=jakarta.inject.Singleton
quarkus.rest-client.spicerack-api.connect-timeout=5000
quarkus.rest-client.spicerack-api.read-timeout=15000
meta.spicerack.enabled=${META_SPICERACK_ENABLED:true}
meta.spicerack.api-key=${SPICERACK_API_KEY:}
meta.spicerack.num-days=${META_SPICERACK_NUM_DAYS:30}
meta.spicerack.max-tournaments=${META_SPICERACK_MAX_TOURNAMENTS:10}
quarkus.rest-client.topdeck-api.url=${TOPDECK_API_URL:https://topdeck.gg/api/v2/tournaments}
quarkus.rest-client.topdeck-api.scope=jakarta.inject.Singleton
quarkus.rest-client.topdeck-api.connect-timeout=5000
quarkus.rest-client.topdeck-api.read-timeout=15000
quarkus.rest-client.commander-spellbook-api.url=${COMMANDER_SPELLBOOK_API_URL:https://backend.commanderspellbook.com}
quarkus.rest-client.commander-spellbook-api.scope=jakarta.inject.Singleton
quarkus.rest-client.commander-spellbook-api.connect-timeout=5000
quarkus.rest-client.commander-spellbook-api.read-timeout=15000
meta.topdeck.enabled=${META_TOPDECK_ENABLED:false}
meta.topdeck.api-key=${TOPDECK_API_KEY:}
meta.topdeck.days=${META_TOPDECK_DAYS:90}
meta.topdeck.min-participants=${META_TOPDECK_MIN_PARTICIPANTS:32}
meta.topdeck.max-tournaments=${META_TOPDECK_MAX_TOURNAMENTS:10}
meta.dataset.file=${META_DATASET_FILE:data/meta-decks.json}
meta.profiles.file=${META_PROFILES_FILE:data/commander-meta-profiles.json}
meta.external-import.owner-id=${META_EXTERNAL_IMPORT_OWNER_ID:external-import}

quarkus.hibernate-orm.log.sql=${HIBERNATE_LOG_SQL:false}

# H2 in-memory datasource for local development and tests.
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:mtg;DB_CLOSE_DELAY=-1
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:mtg;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# PostgreSQL profile for local production-like runs.
# Start the local database with: docker compose up -d postgres
# Then run the backend with: ./mvnw quarkus:dev -Dquarkus.profile=pg
%pg.quarkus.datasource.db-kind=postgresql
%pg.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/mtg_deck_manager}
%pg.quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:mtg}
%pg.quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:mtg_dev_password}
%pg.quarkus.datasource.health.enabled=true
%pg.quarkus.hibernate-orm.schema-management.strategy=validate
%pg.quarkus.flyway.migrate-at-start=true
%pg.quarkus.flyway.locations=db/migration

# Production must validate an already migrated PostgreSQL schema.
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL}
%prod.quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME}
%prod.quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD}
%prod.quarkus.datasource.health.enabled=true
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
%prod.quarkus.flyway.migrate-at-start=${QUARKUS_FLYWAY_MIGRATE_AT_START:false}
%prod.quarkus.flyway.locations=db/migration

# Enable CORS for frontend dev and GitHub Pages deployments.
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173,https://danilocatapan.github.io}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,origin,referer,user-agent,x-admin-key,x-request-id,x-requested-with
quarkus.http.cors.exposed-headers=Location,Content-Disposition,X-Request-Id,X-Total-Count
quarkus.http.cors.access-control-allow-credentials=false
quarkus.http.cors.access-control-max-age=24H

# Browser preflight requests must be answered before endpoint authentication runs.
quarkus.http.auth.permission.cors-preflight.paths=/*
quarkus.http.auth.permission.cors-preflight.methods=OPTIONS
quarkus.http.auth.permission.cors-preflight.policy=permit
quarkus.http.auth.permission.application.paths=/*
quarkus.http.auth.permission.application.policy=permit

%test.quarkus.oidc.enabled=false
%test.quarkus.oidc.tenant-enabled=false
%test.security.admin.subjects=security-admin-user
